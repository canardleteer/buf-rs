# =============================================================================
# Manual crates.io publish — buf-tools + buf-toolchain
#
# --- Verify job summary — source of truth (keep in sync when changing versioning) ---
#
# The verify job summary lists **workspace crate semver** (full `[workspace.package].version`,
# including `-dev`/`-rc` when present) and **Buf core** (`cargo xtask expected-buf-version`),
# then the **Crates Resolved Version** subsection and **resolved buf** lines from:
#   `cargo xtask publish verify-summary --crates-version "$(read-workspace-version.sh)"`
#   (see `xtask/src/main.rs`, fn `emit_verify_summary`).
#
# The Buf release tag **vX.Y.Z** is derived only from `major.minor.patch` of the crate
# semver (ignoring pre-release / build). That rule MUST match:
#   - `buf-tools/build.rs` (~39–40: `Version::parse` on `CARGO_PKG_VERSION`, then core triple)
#   - `buf-toolchain/build.rs` (~29–30: same)
#
# When you change publish/version/summary behavior, update xtask, this header, and both
# `build.rs` files together if the Buf-resolution rule changes.
#
# --- GitHub settings prerequisites (do this before the pipeline can upload) ---
#
# 1) Secret `CRATES_IO_TOKEN` (repository **or** environment `crates-io-publish`)
#    - **Repository:** Settings → Secrets and variables → Actions → New repository secret.
#    - **Environment:** Settings → Environments → `crates-io-publish` → Environment secrets.
#    GitHub only injects **environment** secrets into jobs that declare `environment:` — both
#    **`verify`** and **`upload`** use **`crates-io-publish`** so the verify-step token gate and
#    **`CARGO_REGISTRY_TOKEN`** see the same env-scoped token.
#    While the repository is **private**, you can omit this secret so **`upload`** never runs (only
#    **`verify`** / dry-run).
#
# 2) Environment (approval gate + secret scope for upload, once you publish from CI)
#    - Settings → Environments → New environment → name: crates-io-publish → Configure environment
#    - Under **Deployment protection rules**, add **Required reviewers** if you want the upload job
#      to pause for approval after verify. On GitHub Free / Pro / Team this exists only for **public**
#      repositories (see https://docs.github.com/en/actions/reference/deployments-and-environments#required-reviewers ).
#    - Optional: **Deployment branches and tags** (e.g. main only) — see GitHub docs for your plan.
#
# 3) Actions
#    - Settings → Actions → General: enable Actions; workflow permissions below
#
# Upload is skipped (job skipped, workflow green) when **verify** does not see **CRATES_IO_TOKEN**
# (unset repo secret and unset env secret) — safe for dry testing. Remove the TEMP **if:** on the
# upload job when you always want **upload** to run (see comment on that job).
#
# Dev/rc path: `cargo xtask publish apply-version`, then `cargo generate-lockfile`, then
# publish with `--allow-dirty --locked` (changes are never committed). See `xtask/` + `.cargo/config.toml`.
#
# `publish resolve` / `publish apply-version` always receive `--channel`, `--run-id`, and
# `--rc-number` (empty strings when unused). `xtask/src/publish_inputs.rs` validates the
# channel-specific rules (including rc: positive decimal, no leading zeros).
#
# =============================================================================
name: publish-crates

on:
  workflow_dispatch:
    inputs:
      channel:
        description: dev (default) = -dev.RUN_ID; rc = -rc.N; stable = committed X.Y.Z only
        type: choice
        default: dev
        options:
          - dev
          - rc
          - stable
      rc_number:
        description: For channel=rc only — positive integer (release candidate number)
        type: string
        default: ""
      ref:
        description: Git ref to checkout (this repo only). For channel=stable, must be `main` (see workflow guard). dev/rc may use other branches/SHAs.
        type: string
        default: main
      confirm_stable_version:
        description: For channel=stable — type the exact X.Y.Z from Cargo.toml (required)
        type: string
        default: ""

permissions:
  contents: read
  actions: write

# One publish run at a time (manual); avoids overlapping uploads / environment reviews.
concurrency:
  group: publish-crates-${{ github.repository }}
  cancel-in-progress: false

jobs:
  verify:
    name: verify (dry-run)
    runs-on: ubuntu-latest
    # Same environment as `upload` so `secrets.CRATES_IO_TOKEN` resolves when the token is stored
    # only under Environment secrets (repository secrets are still available here).
    environment: crates-io-publish
    timeout-minutes: 30
    outputs:
      # Job-level `if` on dependent jobs may not use `secrets`; pass through from a step instead.
      have_crates_token: ${{ steps.token_gate.outputs.have }}
      # Full crates.io semver used by post-publish Docker integration (`cargo add` / `cargo install`).
      publish_version: ${{ steps.meta.outputs.publish_version }}
    env:
      BUF_RS_CACHE_DIR: ${{ github.workspace }}/target/buf-rs-cache
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Record whether CRATES_IO_TOKEN is set (for upload job gate)
        id: token_gate
        run: echo "have=${{ secrets.CRATES_IO_TOKEN != '' }}" >> "${GITHUB_OUTPUT}"

      # Bootstrap rustup; channel + components come from repo-root rust-toolchain.toml.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Stable publish only from main
        if: inputs.channel == 'stable'
        run: |
          set -euo pipefail
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "::error::Stable publish must be dispatched from the main branch (github.ref=${{ github.ref }})."
            exit 1
          fi

      - name: Stable checkout ref must be main
        if: inputs.channel == 'stable'
        run: |
          set -euo pipefail
          REF="${{ inputs.ref }}"
          case "${REF}" in
            main|refs/heads/main) ;;
            *)
              echo "::error::Stable publish: inputs.ref must be main (got '${REF}'). Otherwise you can dispatch from main while checking out a different ref."
              exit 1
              ;;
          esac

      - name: Resolve publish version
        id: meta
        env:
          CHANNEL: ${{ inputs.channel }}
          RUN_ID: ${{ inputs.channel == 'dev' && github.run_id || '' }}
          RC_NUMBER: ${{ inputs.channel == 'rc' && inputs.rc_number || '' }}
        run: |
          set -euo pipefail
          V="$(cargo xtask publish resolve --channel "${CHANNEL}" --run-id "${RUN_ID}" --rc-number "${RC_NUMBER}")"
          echo "publish_version=${V}" >> "${GITHUB_OUTPUT}"

      - name: Confirm stable version (type-to-confirm)
        if: inputs.channel == 'stable'
        env:
          EXPECT: ${{ steps.meta.outputs.publish_version }}
          GOT: ${{ inputs.confirm_stable_version }}
        run: |
          set -euo pipefail
          if [ -z "${GOT}" ]; then
            echo "::error::confirm_stable_version is required when channel=stable (type the exact X.Y.Z)."
            exit 1
          fi
          if [ "${GOT}" != "${EXPECT}" ]; then
            echo "::error::confirm_stable_version must equal workspace version ${EXPECT} (got '${GOT}')."
            exit 1
          fi

      - name: Apply dev/rc version to Cargo.toml (runner only)
        if: inputs.channel == 'dev' || inputs.channel == 'rc'
        env:
          CHANNEL: ${{ inputs.channel }}
          RUN_ID: ${{ inputs.channel == 'dev' && github.run_id || '' }}
          RC_NUMBER: ${{ inputs.channel == 'rc' && inputs.rc_number || '' }}
        run: |
          set -euo pipefail
          cargo xtask publish apply-version --channel "${CHANNEL}" --run-id "${RUN_ID}" --rc-number "${RC_NUMBER}"

      - name: Regenerate Cargo.lock after dev/rc manifest version (dev/rc only)
        if: inputs.channel == 'dev' || inputs.channel == 'rc'
        run: |
          set -euo pipefail
          cargo generate-lockfile

      - name: Upload Cargo.toml snapshots (debugging)
        uses: actions/upload-artifact@v4
        with:
          name: publish-cargo-toml-${{ inputs.channel }}-${{ github.run_id }}-${{ github.run_attempt }}-verify
          path: |
            Cargo.toml
            buf-tools/Cargo.toml
            buf-toolchain/Cargo.toml

      - name: Set BUF_EXPECT_VERSION for build.rs / smoke tests
        run: |
          set -euo pipefail
          if [ "${{ inputs.channel }}" = "dev" ] || [ "${{ inputs.channel }}" = "rc" ]; then
            CORE="$(cargo xtask expected-buf-version)"
            echo "BUF_EXPECT_VERSION=${CORE}" >> "${GITHUB_ENV}"
          else
            echo "BUF_EXPECT_VERSION=$(bash .github/ci-scripts/read-workspace-version.sh)" >> "${GITHUB_ENV}"
          fi

      - name: cargo publish --dry-run
        run: |
          set -euo pipefail
          mkdir -p "${BUF_RS_CACHE_DIR}"
          if [ "${{ inputs.channel }}" = "dev" ] || [ "${{ inputs.channel }}" = "rc" ]; then
            cargo publish -p buf-tools --dry-run --locked --allow-dirty
            cargo publish -p buf-toolchain --dry-run --locked --allow-dirty
          else
            cargo publish -p buf-tools --dry-run --locked
            cargo publish -p buf-toolchain --dry-run --locked
          fi

      - name: Job summary
        env:
          HAVE_CRATES_TOKEN: ${{ steps.token_gate.outputs.have }}
          CHANNEL: ${{ inputs.channel }}
          REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          HEAD_SHA="$(git rev-parse HEAD)"
          VER="$(bash .github/ci-scripts/read-workspace-version.sh)"
          BUF_CORE="$(cargo xtask expected-buf-version)"
          {
            echo "## Publish verify"
            echo "- **Channel:** ${CHANNEL}"
            echo "- **Checkout ref (input):** ${REF}"
            echo "- **Commit:** \`${HEAD_SHA}\`"
            echo "- **Workflow dispatch ref:** \`${{ github.ref }}\`"
            echo "- **Workspace crate semver** (\`[workspace.package].version\`, full string): \`${VER}\`"
            echo "- **Buf core** (upstream tag \`vX.Y.Z\`, \`build.rs\` / \`BUF_EXPECT_VERSION\`): \`${BUF_CORE}\`"
            echo ""
            cargo xtask publish verify-summary --crates-version "${VER}"
            echo ""
            if [ "${HAVE_CRATES_TOKEN}" = "true" ]; then
              echo "Upload job uses environment **crates-io-publish**. If that environment has **Required reviewers** (public repos on Free/Pro/Team), the run waits for approval; with no protection rules, upload starts right after verify."
            else
              echo "**Upload skipped** — \`CRATES_IO_TOKEN\` was not visible to **verify** (empty). Add it as a **repository** Actions secret, or as a secret on environment **crates-io-publish** (both **verify** and **upload** use that environment)."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

  upload:
    name: upload (crates.io)
    needs: verify
    # TEMP: skip upload when CRATES_IO_TOKEN unset — remove the next `if:` line once the token is always configured.
    if: ${{ needs.verify.outputs.have_crates_token == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: crates-io-publish
    env:
      BUF_RS_CACHE_DIR: ${{ github.workspace }}/target/buf-rs-cache
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref }}

      # Bootstrap rustup; channel + components come from repo-root rust-toolchain.toml.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Stable publish only from main
        if: inputs.channel == 'stable'
        run: |
          set -euo pipefail
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "::error::Stable publish must be dispatched from the main branch (github.ref=${{ github.ref }})."
            exit 1
          fi

      - name: Stable checkout ref must be main
        if: inputs.channel == 'stable'
        run: |
          set -euo pipefail
          REF="${{ inputs.ref }}"
          case "${REF}" in
            main|refs/heads/main) ;;
            *)
              echo "::error::Stable publish: inputs.ref must be main (got '${REF}')."
              exit 1
              ;;
          esac

      - name: Apply dev/rc version to Cargo.toml (runner only)
        if: inputs.channel == 'dev' || inputs.channel == 'rc'
        env:
          CHANNEL: ${{ inputs.channel }}
          RUN_ID: ${{ inputs.channel == 'dev' && github.run_id || '' }}
          RC_NUMBER: ${{ inputs.channel == 'rc' && inputs.rc_number || '' }}
        run: |
          set -euo pipefail
          cargo xtask publish apply-version --channel "${CHANNEL}" --run-id "${RUN_ID}" --rc-number "${RC_NUMBER}"

      - name: Regenerate Cargo.lock after dev/rc manifest version (dev/rc only)
        if: inputs.channel == 'dev' || inputs.channel == 'rc'
        run: |
          set -euo pipefail
          cargo generate-lockfile

      - name: Upload Cargo.toml snapshots (debugging)
        uses: actions/upload-artifact@v4
        with:
          name: publish-cargo-toml-${{ inputs.channel }}-${{ github.run_id }}-${{ github.run_attempt }}-upload
          path: |
            Cargo.toml
            buf-tools/Cargo.toml
            buf-toolchain/Cargo.toml

      - name: Set BUF_EXPECT_VERSION
        run: |
          set -euo pipefail
          if [ "${{ inputs.channel }}" = "dev" ] || [ "${{ inputs.channel }}" = "rc" ]; then
            CORE="$(cargo xtask expected-buf-version)"
            echo "BUF_EXPECT_VERSION=${CORE}" >> "${GITHUB_ENV}"
          else
            echo "BUF_EXPECT_VERSION=$(bash .github/ci-scripts/read-workspace-version.sh)" >> "${GITHUB_ENV}"
          fi

      - name: cargo publish
        run: |
          set -euo pipefail
          mkdir -p "${BUF_RS_CACHE_DIR}"
          FLAGS=(--locked)
          if [ "${{ inputs.channel }}" = "dev" ] || [ "${{ inputs.channel }}" = "rc" ]; then
            FLAGS+=(--allow-dirty)
          fi
          cargo publish -p buf-tools "${FLAGS[@]}"
          cargo publish -p buf-toolchain "${FLAGS[@]}"

  post-publish-integration:
    name: post-publish integration (Docker)
    needs:
      - verify
      - upload
    if: ${{ needs.upload.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TEST_CRATE_VERSION: ${{ needs.verify.outputs.publish_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Stage integration Docker context
        id: stage
        run: |
          set -euo pipefail
          CTX="${RUNNER_TEMP}/integration-context"
          rm -rf "${CTX}"
          mkdir -p "${CTX}/proto"
          cp rust-toolchain.toml "${CTX}/"
          cp .github/ci/integration/Cargo.toml \
            .github/ci/integration/Dockerfile \
            .github/ci/integration/entrypoint.sh \
            "${CTX}/"
          chmod +x "${CTX}/entrypoint.sh"
          cp examples/buf_lint.rs examples/protoc_with_buf_plugins.rs "${CTX}/"
          cp -r examples/proto/* "${CTX}/proto/"
          echo "context=${CTX}" >> "${GITHUB_OUTPUT}"

      - name: Rust Docker tag from rust-toolchain.toml
        id: rust_docker_tag
        run: |
          set -euo pipefail
          TAG="$(bash .github/ci-scripts/rust-docker-tag-from-toolchain.sh rust-toolchain.toml)"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build integration image
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.stage.outputs.context }}
          push: false
          load: true
          tags: buf-rs-integration:ci
          build-args: RUST_DOCKER_TAG=${{ steps.rust_docker_tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run integration container
        run: |
          set -euo pipefail
          docker run --rm -e "TEST_CRATE_VERSION=${TEST_CRATE_VERSION}" buf-rs-integration:ci
